; ==========================================================
; Config cho Obtainium import links
; Moi app la 1 section rieng: [TenSection]
; Cac app cung "group" se duoc gom chung 1 bang, theo dung
; thu tu xuat hien trong file nay.
;
; Cac key bat buoc: group, label, id, url, author, name
; Cac key tuy chon: preferredApkIndex, overrideSource
; Bat ky key nao khac (vd versionDetection, apkFilterRegEx)
; se tu dong duoc dua vao "additionalSettings"
; ==========================================================

[title]
page_title = Import Links cho Obtainium

[GmsCore-Default]
group = GmsCore (microG)
label = Default
id = app.revanced.android.gms
url = https://github.com/ReVanced/GmsCore
author = ReVanced
name = GmsCore
versionDetection = false
apkFilterRegEx = ^[^hw]+$

[GmsCore-Huawei]
group = GmsCore (microG)
label = Huawei
id = app.revanced.android.gms
